name: Interactive SSH to VM

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for interactive session"
        required: true
        default: "debug"

jobs:
  interactive-vm-session:
    name: Interactive shell on Cloud VM
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH to VM
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VM_HOST }} >> ~/.ssh/known_hosts
          echo '#!/bin/bash' > ~/connect_vm.sh
          echo 'echo "==========================================="' >> ~/connect_vm.sh
          echo 'echo " Connecting you to VM..."' >> ~/connect_vm.sh
          echo 'echo "==========================================="' >> ~/connect_vm.sh
          echo 'ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}' >> ~/connect_vm.sh
          chmod +x ~/connect_vm.sh
          echo "alias vm='~/connect_vm.sh'" >> ~/.bashrc
          echo 'echo ">>> Type: vm  to connect to your server <<<"' >> ~/.bashrc

      - name: Start tmate (type vm to SSH into your server)
        uses: mxschmitt/action-tmate@v3
        with:
          limit-access-to-actor: true
        timeout-minutes: 30
