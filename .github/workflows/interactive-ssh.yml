name: Interactive SSH to VM

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for interactive session"
        required: true
        default: "debug"

jobs:
  interactive-vm-session:
    name: Interactive shell on Cloud VM
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VM_HOST }} >> ~/.ssh/known_hosts

      - name: Install upterm on VM
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} bash -s << 'REMOTE'
          if ! command -v upterm &>/dev/null; then
            curl -sL https://github.com/owenthereal/upterm/releases/latest/download/upterm_linux_amd64.tar.gz | tar xz -C /usr/local/bin
          fi
          echo "upterm ready: $(upterm version)"
          REMOTE

      - name: Start interactive session on VM
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} bash -s << 'REMOTE'
          # Kill any existing upterm sessions
          pkill -f upterm 2>/dev/null || true
          sleep 1

          # Generate a host key for upterm
          rm -f /tmp/upterm_host_key
          ssh-keygen -t ed25519 -f /tmp/upterm_host_key -N "" -q

          # Start upterm session in background
          nohup upterm host --server ssh://uptermd.upterm.dev:22 \
            --force-command bash \
            --private-key /tmp/upterm_host_key \
            -- bash > /tmp/upterm.log 2>&1 &

          # Wait for session to be ready
          for i in $(seq 1 30); do
            if upterm session current 2>/dev/null | grep -q "SSH"; then
              break
            fi
            sleep 2
          done

          echo "============================================="
          echo "  INTERACTIVE SSH SESSION TO YOUR VM"
          echo "============================================="
          echo ""
          upterm session current
          echo ""
          echo "============================================="
          echo "Session will stay alive for ~30 minutes."
          echo "Cancel this workflow when done."
          echo "============================================="
          REMOTE

      - name: Keep alive (waiting for you to finish)
        run: |
          echo "Session is active on your VM. Waiting for you to finish..."
          echo "Cancel this workflow run when you're done."
          sleep 1800
